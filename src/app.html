<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#7c3aed" />

		<!-- Primary -->
		<meta name="description" content="Vestara is a Web3 donation platform on Solana. Donate branded secondhand goods, earn ARA tokens, and redeem them for items in the Vestara marketplace." />

		<!-- Open Graph -->
		<meta property="og:title" content="Vestara — Donate, Earn and Trade" />
		<meta property="og:description" content="Turn your branded secondhand items into ARA utility tokens on Solana. Donate, earn, and redeem — a circular economy powered by Web3." />
		<meta property="og:image" content="%sveltekit.assets%/favicon.svg" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Vestara" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Vestara — Donate, Earn and Trade" />
		<meta name="twitter:description" content="Donate branded secondhand goods on Solana, earn ARA tokens, and claim items from the Vestara marketplace. Web3 meets sustainable fashion." />
		<meta name="twitter:image" content="%sveltekit.assets%/favicon.svg" />

		<!-- Extra -->
		<meta name="keywords" content="Vestara, ARA token, Solana, Web3, secondhand, donation, marketplace, sustainable fashion, DeFi" />

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
