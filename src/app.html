<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#7c3aed" />
		<meta name="description" content="Your app description" />
		<meta name="author" content="Crownss" />

		<!-- Open Graph -->
		<meta property="og:title" content="Vestara" />
		<meta property="og:description" content="Your app description" />
		<meta property="og:image" content="%sveltekit.assets%/og-image.png" />
		<meta property="og:type" content="website" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Vestara" />
		<meta name="twitter:description" content="Your app description" />
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.png" />

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
